<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tijolo Blast – Breakout Moderno</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
  }
  h1 {
    font-size: 1.6rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #f72585, #4cc9f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  #ui {
    display: flex; gap: 30px; align-items: center;
    margin-bottom: 8px; font-size: 1rem;
  }
  #ui span { color: #aaa; }
  #ui strong { color: #fff; font-size: 1.1rem; }
  canvas {
    display: block;
    border: 2px solid #222;
    border-radius: 8px;
    box-shadow: 0 0 40px #4cc9f055;
  }
  #btnRestart {
    margin-top: 12px;
    padding: 8px 28px;
    background: linear-gradient(90deg, #f72585, #7209b7);
    border: none; border-radius: 20px;
    color: #fff; font-size: 0.95rem;
    cursor: pointer; letter-spacing: 2px;
    transition: opacity .2s;
  }
  #btnRestart:hover { opacity: .8; }
</style>
</head>
<body>
<h1>Tijolo Blast</h1>
<div id="ui">
  <span>PONTOS: <strong id="scoreEl">0</strong></span>
  <span>NÍVEL: <strong id="levelEl">1</strong></span>
  <span>VIDAS: <strong id="livesEl">❤️❤️❤️</strong></span>
</div>
<canvas id="c" width="560" height="520"></canvas>
<button id="btnRestart">↺ REINICIAR</button>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const C = document.getElementById('c');
const X = C.getContext('2d');
const W = C.width, H = C.height;

const PADDLE_H = 12;
const BALL_R   = 8;
const BRICK_W  = 60, BRICK_H = 22, BRICK_GAP = 5;
const COLS = 8, ROWS_BASE = 5;

// tipos de bloco
const T = { NORMAL:0, HARD:1, EXPLOSIVE:2, BONUS:3, INDESTRUCTIBLE:4 };

// cores
const PALETTE = {
  [T.NORMAL]:        ['#4cc9f0','#00b4d8'],
  [T.HARD]:          ['#f72585','#b5179e'],
  [T.EXPLOSIVE]:     ['#ff6b35','#f7931e'],
  [T.BONUS]:         ['#72efdd','#4ade80'],
  [T.INDESTRUCTIBLE]:['#555','#333'],
};

// ─── ESTADO ───────────────────────────────────────────────
let score, lives, level, gameOver, won, paused, started;
let paddle, balls, bricks, particles, powerUps, activePU;

function init(lvl = 1) {
  level   = lvl;
  score   = score || 0;
  lives   = 3;
  gameOver= false;
  won     = false;
  paused  = false;
  started = false;

  paddle = { x: W/2-50, y: H-30, w: 100, h: PADDLE_H, spd: 7 };
  balls  = [];
  particles = [];
  powerUps  = [];
  activePU  = {};

  spawnBall();
  bricks = buildBricks(lvl);
  updateUI();
}

function spawnBall(x, y, angle) {
  const baseSpd = 4 + level * 0.5;
  const a = angle !== undefined ? angle : (-Math.PI/2 + (Math.random()-.5)*.6);
  balls.push({
    x: x ?? W/2, y: y ?? H-50,
    vx: Math.cos(a)*baseSpd, vy: Math.sin(a)*baseSpd,
    r: BALL_R, trail: []
  });
}

// ─── CONSTRUÇÃO DOS TIJOLOS ────────────────────────────────
function buildBricks(lvl) {
  const rows = ROWS_BASE + Math.min(lvl-1, 4);
  const offX = (W - COLS*(BRICK_W+BRICK_GAP) + BRICK_GAP) / 2;
  const offY = 50;
  const br = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < COLS; c++) {
      let type = T.NORMAL;
      const rnd = Math.random();
      if (lvl >= 2 && rnd < .08) type = T.INDESTRUCTIBLE;
      else if (rnd < .10) type = T.EXPLOSIVE;
      else if (rnd < .20) type = T.BONUS;
      else if (rnd < .38 && lvl >= 2) type = T.HARD;

      const hp = type === T.HARD ? (lvl >= 4 ? 3 : 2) : 1;

      br.push({
        x: offX + c*(BRICK_W+BRICK_GAP),
        y: offY + r*(BRICK_H+BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        type, hp, maxHp: hp,
        c, r, alive: true,
        flash: 0
      });
    }
  }
  return br;
}

// ─── POWER-UPS ─────────────────────────────────────────────
const PU_TYPES = ['wide','multi','slow'];
const PU_COLORS= { wide:'#72efdd', multi:'#f72585', slow:'#ffd166' };
const PU_LABELS= { wide:'⬛ BARRA+', multi:'⚬ MULTI', slow:'🐢 LENTO' };

function dropPowerUp(x, y) {
  if (Math.random() < .4) {
    const t = PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
    powerUps.push({ x, y: y+BRICK_H/2, t, vy: 2, r: 10, alive: true });
  }
}

function applyPowerUp(t) {
  if (activePU[t]) clearTimeout(activePU[t].timer);
  if (t === 'wide') {
    paddle.w = Math.min(160, paddle.w + 40);
    activePU[t] = { timer: setTimeout(()=>{ paddle.w = Math.max(80,paddle.w-40); delete activePU[t]; }, 8000) };
  } else if (t === 'multi') {
    const b = balls[0] || { x:W/2, y:H/2 };
    spawnBall(b.x, b.y, Math.random()*Math.PI*2);
    spawnBall(b.x, b.y, Math.random()*Math.PI*2);
  } else if (t === 'slow') {
    balls.forEach(b=>{ b.vx*=.6; b.vy*=.6; });
    activePU[t] = { timer: setTimeout(()=>{ balls.forEach(b=>{ b.vx/=.6; b.vy/=.6; }); delete activePU[t]; }, 6000) };
  }
}

// ─── PARTÍCULAS ────────────────────────────────────────────
function burst(x, y, color, n=10) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*4;
    particles.push({ x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, decay:.02+Math.random()*.03, r:2+Math.random()*3,
      color });
  }
}

// ─── INPUT ─────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key===' '||e.key==='Enter') && !gameOver && !won) started = true;
  if (e.key==='r'||e.key==='R') restart();
});
document.addEventListener('keyup',  e => keys[e.key] = false);

C.addEventListener('mousemove', e => {
  const rect = C.getBoundingClientRect();
  paddle.x = e.clientX - rect.left - paddle.w/2;
  clampPaddle();
  if (!started && !gameOver && !won) started = true;
});

document.getElementById('btnRestart').addEventListener('click', restart);

function clampPaddle() {
  paddle.x = Math.max(0, Math.min(W-paddle.w, paddle.x));
}

function restart() {
  score = 0;
  init(1);
}

// ─── COLISÃO BOLA-TIJOLO ───────────────────────────────────
function ballBrickCollision(ball) {
  for (const br of bricks) {
    if (!br.alive) continue;
    if (br.type === T.INDESTRUCTIBLE) {
      if (rectCircle(br, ball)) reflectBall(ball, br);
      continue;
    }
    if (rectCircle(br, ball)) {
      br.hp--;
      br.flash = 8;
      if (br.hp <= 0) {
        br.alive = false;
        const [c1,c2] = PALETTE[br.type];
        burst(br.x+br.w/2, br.y+br.h/2, c1, br.type===T.EXPLOSIVE?20:10);
        score += br.type===T.BONUS ? 50 : br.type===T.HARD ? 30 : 10;
        if (br.type===T.BONUS) dropPowerUp(br.x+br.w/2, br.y);
        if (br.type===T.EXPLOSIVE) explode(br);
      }
      reflectBall(ball, br);
      updateUI();
    }
  }
}

function explode(src) {
  for (const br of bricks) {
    if (!br.alive || br.type===T.INDESTRUCTIBLE) continue;
    const dx = Math.abs(br.c-src.c), dy = Math.abs(br.r-src.r);
    if (dx<=1 && dy<=1 && !(dx===0&&dy===0)) {
      br.alive = false;
      burst(br.x+br.w/2, br.y+br.h/2,'#ff6b35',12);
      score += 15;
    }
  }
}

function rectCircle(rect, ball) {
  const cx = Math.max(rect.x, Math.min(ball.x, rect.x+rect.w));
  const cy = Math.max(rect.y, Math.min(ball.y, rect.y+rect.h));
  return (ball.x-cx)**2+(ball.y-cy)**2 < ball.r**2;
}

function reflectBall(ball, br) {
  const overlapL = ball.x - br.x;
  const overlapR = br.x+br.w - ball.x;
  const overlapT = ball.y - br.y;
  const overlapB = br.y+br.h - ball.y;
  const minH = Math.min(overlapL, overlapR);
  const minV = Math.min(overlapT, overlapB);
  if (minH < minV) ball.vx *= -1;
  else ball.vy *= -1;
}

// ─── UPDATE ────────────────────────────────────────────────
function update() {
  if (gameOver || won || !started) return;

  // paddle
  if (keys['ArrowLeft']||keys['a']||keys['A']) { paddle.x -= paddle.spd; clampPaddle(); }
  if (keys['ArrowRight']||keys['d']||keys['D']) { paddle.x += paddle.spd; clampPaddle(); }

  // balls
  for (let i = balls.length-1; i>=0; i--) {
    const b = balls[i];
    b.trail.push({x:b.x,y:b.y});
    if (b.trail.length > 8) b.trail.shift();

    b.x += b.vx; b.y += b.vy;

    // paredes
    if (b.x-b.r < 0)  { b.x=b.r;   b.vx=Math.abs(b.vx); }
    if (b.x+b.r > W)  { b.x=W-b.r; b.vx=-Math.abs(b.vx); }
    if (b.y-b.r < 0)  { b.y=b.r;   b.vy=Math.abs(b.vy); }

    // paddle
    if (b.vy>0 && b.y+b.r >= paddle.y && b.y-b.r <= paddle.y+paddle.h
        && b.x >= paddle.x && b.x <= paddle.x+paddle.w) {
      b.y = paddle.y - b.r;
      const rel = (b.x - (paddle.x+paddle.w/2)) / (paddle.w/2);
      const a = rel * (Math.PI/3);
      const spd = Math.hypot(b.vx,b.vy);
      b.vx = Math.sin(a)*spd;
      b.vy = -Math.abs(Math.cos(a)*spd);
    }

    // tijolos
    ballBrickCollision(b);

    // caiu
    if (b.y - b.r > H) {
      balls.splice(i,1);
      if (balls.length === 0) {
        lives--;
        updateUI();
        if (lives <= 0) { gameOver=true; return; }
        spawnBall();
        started = false;
      }
    }
  }

  // power-ups
  for (let i=powerUps.length-1;i>=0;i--) {
    const p = powerUps[i];
    p.y += p.vy;
    if (p.y > paddle.y && p.y < paddle.y+paddle.h
        && p.x > paddle.x && p.x < paddle.x+paddle.w) {
      applyPowerUp(p.t);
      burst(p.x,p.y,PU_COLORS[p.t],8);
      powerUps.splice(i,1);
    } else if (p.y > H) powerUps.splice(i,1);
  }

  // partículas
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.05;
    p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }

  // vitória
  if (bricks.every(b=>!b.alive||b.type===T.INDESTRUCTIBLE)) {
    const nextLvl = level+1;
    score += nextLvl*100;
    updateUI();
    if (nextLvl > 6) { won=true; return; }
    setTimeout(()=>init(nextLvl),1200);
    won=true;
  }
}

// ─── DRAW ──────────────────────────────────────────────────
function drawBg() {
  const grad = X.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0a1a');
  grad.addColorStop(1,'#10102a');
  X.fillStyle=grad; X.fillRect(0,0,W,H);
}

function drawBricks() {
  for (const br of bricks) {
    if (!br.alive) continue;
    const [c1,c2] = PALETTE[br.type];
    const grad = X.createLinearGradient(br.x,br.y,br.x,br.y+br.h);
    grad.addColorStop(0, br.flash>0?'#fff':c1);
    grad.addColorStop(1, br.flash>0?c1:c2);
    if (br.flash>0) br.flash--;
    X.fillStyle=grad;
    X.beginPath();
    X.roundRect(br.x,br.y,br.w,br.h,4);
    X.fill();
    // HP bar para hard
    if (br.type===T.HARD && br.hp>0 && br.hp<br.maxHp) {
      X.fillStyle='#000a';
      X.fillRect(br.x+2,br.y+br.h-5,br.w-4,4);
      X.fillStyle=c1;
      X.fillRect(br.x+2,br.y+br.h-5,(br.w-4)*(br.hp/br.maxHp),4);
    }
    // ícone explosivo
    if (br.type===T.EXPLOSIVE) {
      X.fillStyle='#fff'; X.font='12px serif';
      X.textAlign='center'; X.textBaseline='middle';
      X.fillText('💥',br.x+br.w/2,br.y+br.h/2);
    }
    if (br.type===T.BONUS) {
      X.fillStyle='#fff'; X.font='11px serif';
      X.textAlign='center'; X.textBaseline='middle';
      X.fillText('★',br.x+br.w/2,br.y+br.h/2);
    }
    if (br.type===T.INDESTRUCTIBLE) {
      X.fillStyle='#888'; X.font='bold 12px sans-serif';
      X.textAlign='center'; X.textBaseline='middle';
      X.fillText('▦',br.x+br.w/2,br.y+br.h/2);
    }
  }
}

function drawPaddle() {
  const g=X.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
  g.addColorStop(0,'#7209b7'); g.addColorStop(1,'#4cc9f0');
  X.fillStyle=g;
  X.beginPath();
  X.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);
  X.fill();
  // brilho
  X.fillStyle='rgba(255,255,255,.3)';
  X.fillRect(paddle.x+4,paddle.y+2,paddle.w-8,3);
}

function drawBalls() {
  for (const b of balls) {
    // trail
    for (let i=0;i<b.trail.length;i++) {
      const t=b.trail[i], alpha=(i/b.trail.length)*.3;
      X.beginPath();
      X.arc(t.x,t.y,b.r*(i/b.trail.length),0,Math.PI*2);
      X.fillStyle=`rgba(76,201,240,${alpha})`;
      X.fill();
    }
    // bola
    const g=X.createRadialGradient(b.x-2,b.y-2,1,b.x,b.y,b.r);
    g.addColorStop(0,'#fff'); g.addColorStop(1,'#4cc9f0');
    X.beginPath(); X.arc(b.x,b.y,b.r,0,Math.PI*2);
    X.fillStyle=g; X.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    X.globalAlpha=p.life;
    X.fillStyle=p.color;
    X.beginPath(); X.arc(p.x,p.y,p.r,0,Math.PI*2); X.fill();
  }
  X.globalAlpha=1;
}

function drawPowerUps() {
  for (const p of powerUps) {
    X.fillStyle=PU_COLORS[p.t];
    X.beginPath(); X.arc(p.x,p.y,p.r,0,Math.PI*2); X.fill();
    X.fillStyle='#000'; X.font='bold 7px sans-serif';
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText(p.t.toUpperCase(),p.x,p.y);
  }
}

function drawOverlay() {
  if (!started && !gameOver && !won) {
    X.fillStyle='rgba(0,0,0,.55)';
    X.fillRect(0,0,W,H);
    X.fillStyle='#fff'; X.font='bold 22px Segoe UI';
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText('🎮 Mova o mouse ou pressione ← → para começar',W/2,H/2);
  }
  if (gameOver) {
    X.fillStyle='rgba(0,0,0,.7)'; X.fillRect(0,0,W,H);
    X.fillStyle='#f72585'; X.font='bold 42px Segoe UI';
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText('GAME OVER',W/2,H/2-24);
    X.fillStyle='#aaa'; X.font='18px Segoe UI';
    X.fillText(`Pontuação final: ${score}`,W/2,H/2+20);
    X.fillText('Pressione R ou clique em Reiniciar',W/2,H/2+50);
  }
  if (won && level > 6) {
    X.fillStyle='rgba(0,0,0,.7)'; X.fillRect(0,0,W,H);
    X.fillStyle='#72efdd'; X.font='bold 38px Segoe UI';
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText('🏆 VOCÊ VENCEU!',W/2,H/2-24);
    X.fillStyle='#fff'; X.font='18px Segoe UI';
    X.fillText(`Pontuação: ${score}`,W/2,H/2+20);
  }
  if (won && level <= 6) {
    X.fillStyle='rgba(0,0,0,.5)'; X.fillRect(0,0,W,H);
    X.fillStyle='#4ade80'; X.font='bold 30px Segoe UI';
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText(`✓ Nível ${level-1} completo!`,W/2,H/2-10);
    X.fillStyle='#aaa'; X.font='16px Segoe UI';
    X.fillText('Carregando próximo nível…',W/2,H/2+24);
  }
}

function updateUI() {
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('levelEl').textContent=level;
  document.getElementById('livesEl').textContent='❤️'.repeat(Math.max(0,lives));
}

// ─── LOOP ──────────────────────────────────────────────────
function loop() {
  update();
  drawBg();
  drawBricks();
  drawPaddle();
  drawBalls();
  drawParticles();
  drawPowerUps();
  drawOverlay();
  requestAnimationFrame(loop);
}

// ─── START ─────────────────────────────────────────────────
init(1);
loop();
</script>
</body>
</html>
